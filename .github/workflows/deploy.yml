name: Deploy GravySyncro Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: /opt/deploy-scripts/deploy-gravysyncro-backend.sh

      - name: Notify success
        if: success()
        run: echo "✅ GravySyncro backend deployed successfully!"

      - name: Notify failure
        if: failure()
        run: echo "❌ GravySyncro backend deployment failed!"
